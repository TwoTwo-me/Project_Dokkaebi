schema_version: dokkaebi.project_scope.v0
id: project-dokkaebi
name: Project Dokkaebi bootstrap scope
description: >-
  Bootstrap ProjectScope that lets Dokkaebi manage its own repository through a
  Symphony-native GitHub Project loop.
status: remote-project-created
created_utc: "2026-05-27T00:00:00Z"

repository:
  provider: github
  owner: TwoTwo-me
  name: Project_Dokkaebi
  remote_url: git@github.com:TwoTwo-me/Project_Dokkaebi.git
  local_path: /home/koreaplayer99/Project_Dokkaebi
  default_branch: main
  worker_ref_env: DOKKAEBI_WORKER_REF
  allowed_paths:
    - README.md
    - ARCHITECTURE.md
    - WORKFLOW.md
    - docs/**
    - scripts/**
    - dokkaebi/**
    - symphony-github-project-tracker/**

manager:
  active_runtime: codex-omx
  contract: docs/contracts/manager-contract.md
  adapter_notes:
    - docs/adapters/hermes.md
  duties:
    - intake
    - ticket_drafting
    - approval_preflight
    - result_review
    - human_summary

symphony:
  canonical_execution_layer: true
  source_of_truth: docs/adr/0002-symphony-native-execution-layer.md
  implementation:
    kind: local-github-project-tracker
    path: symphony-github-project-tracker
    workflow_file: dokkaebi/symphony/WORKFLOW.project-dokkaebi.md
  scheduler_owner: symphony
  dokkaebi_owner: manager_and_policy_above_symphony

tracker:
  kind: github-project-v2
  owner: Project-Dokkaebi
  repository_owner: TwoTwo-me
  repository: Project_Dokkaebi
  project_title: Dokkaebi Bootstrap
  project_number: 1
  project_id: PVT_kwHOES1Fes4BY7jD
  project_url: https://github.com/users/Project-Dokkaebi/projects/1
  token_env: GITHUB_GRAPHQL_TOKEN
  state_field: Dokkaebi Status
  priority_field: Priority
  admission_labels:
    - dokkaebi
    - symphony
  status_mapping:
    intake: Intake
    clarifying: Clarifying
    ready: Ready
    dispatchable: Dispatchable
    in_progress: In Progress
    needs_review: Human Review
    fix_requested: Fix Requested
    merging: Merging
    done: Done
    reopened: Reopened
    blocked: Blocked
    failed: Failed
    cancelled: Cancelled
  active_states:
    - Dispatchable
    - In Progress
    - Fix Requested
  wait_states:
    - Intake
    - Clarifying
    - Ready
    - Human Review
    - Merging
    - Blocked
    - Reopened
  terminal_states:
    - Done
    - Failed
    - Cancelled
  blocker_check_states:
    - Dispatchable
  human_review_transition_policy:
    review_state: Human Review
    manager_may_enter_review_state: true
    terminal_approval_transitions:
      - from: Human Review
        to: Merging
        required_origin: human
      - from: Human Review
        to: Done
        required_origin: human
    manager_self_approval: forbidden
    unknown_or_ambiguous_provenance: fail_closed
    provenance_sources:
      - github_project_status_history_actor
      - durable_human_approval_record
      - future_approved_approval_broker
    enabled_provenance_sources:
      - durable_human_approval_record
    trusted_provenance_verifiers:
      - dokkaebi-github-project-status-adapter
      - dokkaebi-human-approval-record-adapter
      - dokkaebi-approval-broker
    source_verification:
      github_project_status_history_actor: github_project_status_history_query
      durable_human_approval_record: approval_record_path
      future_approved_approval_broker: broker_signed_decision
    approval_required_actions:
      - pr_merge
      - github_issue_close
      - deployment
      - human_review_to_merging_transition
      - human_review_to_done_transition
    approval_action_aliases:
      merge_pr: pr_merge
      repo.pr.merge: pr_merge
      deploy_or_cutover: deployment
      repo.deploy: deployment
      deploy: deployment
    required_transition_record_fields:
      - source_status
      - target_status
      - actor
      - actor_origin
      - provenance_source
      - approved_action
      - linked_ticket_or_item
      - linked_result_packet_or_review
      - provenance_record_id
      - provenance_checked_by
      - provenance_verification_method
      - provenance_evidence_file
      - provenance_evidence_sha256

worker_routing:
  default_required_capability: basic
  capability_model: docs/contracts/worker-capability-model.md
  allowed_capabilities:
    - basic
    - container-capable
    - testbed
  default_os: linux
  allowed_os:
    - linux
  admission_rule: >-
    A project item is dispatchable only when status, admission labels, capability
    metadata, permission level, validation plan, and approval gates all pass.

runtime_provider:
  contract: docs/contracts/runtime-provider-contract.md
  default_provider: local-basic
  providers:
    local-basic:
      kind: local-process
      environment_tier: dev
      capabilities:
        - basic
      status: available-for-bootstrap
    host-docker:
      kind: host-docker-helper
      environment_tier: dev
      capabilities:
        - container-capable
      status: planned-not-enabled
      requires_approval: true
      notes: >-
        Must go through a narrow audited host helper daemon; do not mount a broad
        host Docker socket into Dokkaebi or Worker containers by default.

  policy:
    file: dokkaebi/policies/project-dokkaebi.yml
    fail_closed: true
    credential_broker_required_for_credentials: true
    kill_switch_file: dokkaebi/KILL_SWITCH
    repeat_dispatch_guard: >-
      Manager result ingestion must move completed Worker output out of active
      states, normally to Human Review, before an unattended loop is allowed to
      continue polling the same item.

audit:
  approvals_dir: dokkaebi/approvals
  result_packet_template: docs/templates/worker-result-packet.md
  worker_ticket_template: docs/templates/worker-ticket.md
