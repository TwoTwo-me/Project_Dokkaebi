apiVersion: v1
kind: Endpoints
metadata:
  name: litellm
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/external-endpoint: "true"
    dokkaebi.io/litellm-endpoint-host: "10.10.40.150"
subsets:
  - addresses:
      - ip: 10.10.40.150
    ports:
      - name: http
        port: 4000
        protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fire-external-litellm-egress
  namespace: dokkaebi-system
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dokkaebi-fire
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.10.40.150/32
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hammer-external-litellm-egress
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dokkaebi-hammer
      dokkaebi.io/litellm-key-scope: run-scoped
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.10.40.150/32
      ports:
        - protocol: TCP
          port: 4000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-external-litellm-egress
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.10.40.150/32
      ports:
        - protocol: TCP
          port: 4000
