apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      version: v1
      kind: ServiceAccount
      name: dokkaebi-fire
      namespace: dokkaebi-system
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          dokkaebi.io/live-apply-gate: explicit-human-approved-aws-iam-and-eks
          dokkaebi.io/identity-boundary: fire-orchestrator-only
          eks.amazonaws.com/role-arn: REPLACE_WITH_APPROVED_EKS_FIRE_ROLE_ARN
  - target:
      version: v1
      kind: ServiceAccount
      name: litellm
      namespace: dokkaebi-llm
    patch: |-
      - op: add
        path: /metadata/annotations
        value:
          dokkaebi.io/live-apply-gate: explicit-human-approved-aws-iam-and-eks
          dokkaebi.io/identity-boundary: litellm-gateway-only
          eks.amazonaws.com/role-arn: REPLACE_WITH_APPROVED_EKS_LITELLM_ROLE_ARN
