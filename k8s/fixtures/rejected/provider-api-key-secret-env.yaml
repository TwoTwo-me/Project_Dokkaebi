apiVersion: batch/v1
kind: Job
metadata:
  name: hammer-ticket-pdk8s-provider-key-denied
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/name: dokkaebi-hammer
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/ticket-id: PDK8S-LITELLM-DENY-PROVIDER
    dokkaebi.io/tenant-id: tenant-sandbox
    dokkaebi.io/approval-id: approval-litellm-deny-provider-2026-06-19
    dokkaebi.io/route-profile: hammer-k8s-readonly
    dokkaebi.io/credential-grant-id: grant-litellm-deny-provider
    dokkaebi.io/image-profile: dokkaebi-hammer-dev-sandbox
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dokkaebi-hammer
        app.kubernetes.io/part-of: dokkaebi
        dokkaebi.io/ticket-id: PDK8S-LITELLM-DENY-PROVIDER
        dokkaebi.io/tenant-id: tenant-sandbox
        dokkaebi.io/route-profile: hammer-k8s-readonly
    spec:
      restartPolicy: Never
      serviceAccountName: hammer-k8s-readonly
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hammer
          image: ghcr.io/twotwo-me/hammer:dev-sandbox
          imagePullPolicy: IfNotPresent
          env:
            - name: DOKKAEBI_TICKET_ID
              value: PDK8S-LITELLM-DENY-PROVIDER
            - name: DOKKAEBI_TENANT_ID
              value: tenant-sandbox
            - name: DOKKAEBI_ROUTE_PROFILE
              value: hammer-k8s-readonly
            - name: DOKKAEBI_NAMESPACE
              value: dokkaebi-workers
            - name: DOKKAEBI_SERVICE_ACCOUNT
              value: hammer-k8s-readonly
            - name: DOKKAEBI_IMAGE_PROFILE
              value: dokkaebi-hammer-dev-sandbox
            - name: DOKKAEBI_RESULT_PACKET_SINK
              value: github-workpad://Project_Dokkaebi_K8S/issues/PDK8S-LITELLM-DENY-PROVIDER
            - name: DOKKAEBI_PERMISSION_LEVEL
              value: docs-only
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: provider-openai-api-key
                  key: api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
