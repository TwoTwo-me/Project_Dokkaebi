apiVersion: v1
kind: ServiceAccount
metadata:
  name: dokkaebi-credential-broker
  namespace: dokkaebi-system
  labels:
    app.kubernetes.io/name: dokkaebi-credential-broker
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
automountServiceAccountToken: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/litellm-config-version: litellm-config-v1
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-postgres
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dokkaebi-litellm-virtual-key-secret-writer
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/name: dokkaebi-credential-broker
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "delete", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dokkaebi-litellm-virtual-key-secret-writer
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/name: dokkaebi-credential-broker
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dokkaebi-litellm-virtual-key-secret-writer
subjects:
  - kind: ServiceAccount
    name: dokkaebi-credential-broker
    namespace: dokkaebi-system
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-runtime-placeholder
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/secret-placeholder: "true"
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/litellm-config-version: litellm-config-v1
type: Opaque
stringData:
  master-key: REPLACE_WITH_APPROVED_LITELLM_MASTER_KEY
  database-url: REPLACE_WITH_APPROVED_LITELLM_DATABASE_URL
  provider-api-key: REPLACE_WITH_APPROVED_PROVIDER_API_KEY_IF_REQUIRED
  postgres-password: REPLACE_WITH_APPROVED_LITELLM_POSTGRES_PASSWORD
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/litellm-config-version: litellm-config-v1
data:
  config.yaml: |
    model_list:
      - model_name: dokkaebi-default
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: os.environ/OPENAI_API_KEY
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
    litellm_settings:
      request_timeout: 60
      success_callback: ["prometheus"]
      failure_callback: ["prometheus"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-postgres-data
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
  annotations:
    dokkaebi.io/host-persistence-placeholder: "true"
    dokkaebi.io/local-hostpath-example: /var/lib/dokkaebi/litellm/postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: dokkaebi-hostpath-placeholder
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-postgres
      app.kubernetes.io/part-of: dokkaebi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-postgres
        app.kubernetes.io/part-of: dokkaebi
        dokkaebi.io/platform-version: "0.1.0-k8s"
    spec:
      serviceAccountName: litellm-postgres
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.4-alpine@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: litellm
            - name: POSTGRES_USER
              value: litellm
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-runtime-placeholder
                  key: postgres-password
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: litellm-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
spec:
  selector:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/part-of: dokkaebi
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/litellm-config-version: litellm-config-v1
    dokkaebi.io/migration-id: migration-k8s-0-1-0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/part-of: dokkaebi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/part-of: dokkaebi
        dokkaebi.io/platform-version: "0.1.0-k8s"
        dokkaebi.io/litellm-config-version: litellm-config-v1
        dokkaebi.io/migration-id: migration-k8s-0-1-0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        dokkaebi.io/credential-boundary: gateway-only
    spec:
      serviceAccountName: litellm
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm-non_root:v1.89.2@sha256:8240e9e0037fd01c4ed394222036e3e66f976714d6a34409df084c452d865034
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/litellm/config.yaml
            - --host
            - 0.0.0.0
            - --port
            - "4000"
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-runtime-placeholder
                  key: master-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-runtime-placeholder
                  key: database-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-runtime-placeholder
                  key: provider-api-key
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/litellm-config-version: litellm-config-v1
spec:
  selector:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/part-of: dokkaebi
  ports:
    - name: http
      port: 4000
      targetPort: http
