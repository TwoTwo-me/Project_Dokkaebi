apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
automountServiceAccountToken: false
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-placeholder
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/secret-placeholder: "true"
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
type: Opaque
stringData:
  admin-user: REPLACE_WITH_APPROVED_GRAFANA_ADMIN_USER
  admin-password: REPLACE_WITH_APPROVED_GRAFANA_ADMIN_PASSWORD
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s
      external_labels:
        project: project-dokkaebi-k8s
        environment: k8s-base
    scrape_configs:
      - job_name: dokkaebi-fire
        metrics_path: /metrics
        static_configs:
          - targets:
              - dokkaebi-fire-metrics.dokkaebi-system.svc.cluster.local:9464
            labels:
              component: fire
              route_class: control-plane
              provider: kubernetes
      - job_name: dokkaebi-litellm
        metrics_path: /metrics
        static_configs:
          - targets:
              - litellm.dokkaebi-llm.svc.cluster.local:4000
            labels:
              component: litellm
              route_class: llm-gateway
              provider: litellm
      - job_name: dokkaebi-work-allocation
        metrics_path: /metrics
        static_configs:
          - targets:
              - dokkaebi-fire-metrics.dokkaebi-system.svc.cluster.local:9464
            labels:
              component: work-allocation
              route_class: hammer-k8s
              provider: kubernetes
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Dokkaebi Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.dokkaebi-observability.svc.cluster.local:9090
        isDefault: true
        editable: false
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: dokkaebi-platform
        orgId: 1
        folder: Dokkaebi
        type: file
        disableDeletion: false
        editable: false
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-dokkaebi-platform
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
data:
  dokkaebi-platform-dashboard.json: |
    {
      "uid": "dokkaebi-k8s-platform",
      "title": "Dokkaebi K8S Platform",
      "schemaVersion": 39,
      "version": 1,
      "tags": ["dokkaebi", "k8s", "litellm"],
      "panels": [
        {
          "title": "Work allocation by route",
          "type": "timeseries",
          "targets": [{"expr": "sum by (route_class) (dokkaebi_work_allocated_total)"}]
        },
        {
          "title": "Hammer route health",
          "type": "stat",
          "targets": [{"expr": "min by (route_class) (dokkaebi_worker_health)"}]
        },
        {
          "title": "LiteLLM spend and token usage",
          "type": "timeseries",
          "targets": [{"expr": "sum by (model, team) (litellm_spend_metric)"}]
        },
        {
          "title": "Credential denials",
          "type": "timeseries",
          "targets": [{"expr": "sum by (approval_gate_status) (dokkaebi_credential_denial_total)"}]
        }
      ]
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
  annotations:
    dokkaebi.io/host-persistence-placeholder: "true"
    dokkaebi.io/local-hostpath-example: /var/lib/dokkaebi/observability/prometheus
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: dokkaebi-hostpath-placeholder
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
  annotations:
    dokkaebi.io/host-persistence-placeholder: "true"
    dokkaebi.io/local-hostpath-example: /var/lib/dokkaebi/observability/grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: dokkaebi-hostpath-placeholder
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: dokkaebi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: dokkaebi
        dokkaebi.io/platform-version: "0.1.0-k8s"
        dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
    spec:
      serviceAccountName: prometheus
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: quay.io/prometheus/prometheus:v2.54.1@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
spec:
  selector:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: dokkaebi
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/part-of: dokkaebi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: dokkaebi
        dokkaebi.io/platform-version: "0.1.0-k8s"
        dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
    spec:
      serviceAccountName: grafana
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-placeholder
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-placeholder
                  key: admin-password
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/dokkaebi-prometheus.yaml
              subPath: datasources.yaml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dokkaebi.yaml
              subPath: dashboard-provider.yaml
              readOnly: true
            - name: dashboards
              mountPath: /etc/grafana/dashboards
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 472
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboard-dokkaebi-platform
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: dokkaebi-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
    dokkaebi.io/platform-version: "0.1.0-k8s"
    dokkaebi.io/dashboard-pack-version: dashboard-pack-v1
spec:
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: dokkaebi
  ports:
    - name: http
      port: 3000
      targetPort: http
