  - apiGroups: [""]
    resources: ["services", "configmaps", "pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hammer-k8s-app-deployer
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/name: dokkaebi-hammer
    app.kubernetes.io/part-of: dokkaebi
