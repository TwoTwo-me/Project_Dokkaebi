apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-hammer-workers
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-fire-system
  namespace: dokkaebi-system
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fire-dns-egress
  namespace: dokkaebi-system
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
