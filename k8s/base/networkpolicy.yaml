apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hammer-kubernetes-api-egress
  namespace: dokkaebi-workers
  labels:
    app.kubernetes.io/part-of: dokkaebi
  annotations:
    dokkaebi.io/cluster-service-ip-placeholder: "true"
    dokkaebi.io/patch-required: "Set cidr to the approved kubernetes.default service IP before applying to a live cluster."
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: dokkaebi-hammer
      dokkaebi.io/k8s-api-access: approved
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.96.0.1/32
      ports:
        - protocol: TCP
          port: 443
---
