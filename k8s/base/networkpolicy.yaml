apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-ingress-from-dokkaebi
  namespace: dokkaebi-llm
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: litellm
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dokkaebi-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dokkaebi-fire
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dokkaebi-workers
          podSelector:
            matchLabels:
              app.kubernetes.io/name: dokkaebi-hammer
              dokkaebi.io/litellm-key-scope: run-scoped
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dokkaebi-observability
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 4000
---
