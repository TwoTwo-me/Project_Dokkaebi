apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: dokkaebi-hammer-job-policy
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["jobs"]
  validations:
    - expression: "object.metadata.namespace == 'dokkaebi-workers'"
      message: "Hammer Jobs selected for this binding must stay in dokkaebi-workers"
    - expression: "'dokkaebi.io/ticket-id' in object.metadata.labels && object.metadata.labels['dokkaebi.io/ticket-id'] != '' && 'dokkaebi.io/tenant-id' in object.metadata.labels && object.metadata.labels['dokkaebi.io/tenant-id'] != '' && 'dokkaebi.io/approval-id' in object.metadata.labels && object.metadata.labels['dokkaebi.io/approval-id'] != '' && 'dokkaebi.io/route-profile' in object.metadata.labels && object.metadata.labels['dokkaebi.io/route-profile'] != '' && 'dokkaebi.io/credential-grant-id' in object.metadata.labels && object.metadata.labels['dokkaebi.io/credential-grant-id'] != '' && 'dokkaebi.io/image-profile' in object.metadata.labels && object.metadata.labels['dokkaebi.io/image-profile'] != ''"
      message: "Hammer Jobs must include non-empty Dokkaebi routing, approval, credential, and image-profile labels"
    - expression: "object.metadata.labels['dokkaebi.io/image-profile'] == 'dokkaebi-hammer-dev-sandbox' && object.spec.template.spec.containers.all(c, c.image == 'ghcr.io/twotwo-me/hammer:dev-sandbox') && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, c.image == 'ghcr.io/twotwo-me/hammer:dev-sandbox')) && (!has(object.spec.template.spec.ephemeralContainers) || object.spec.template.spec.ephemeralContainers.all(c, c.image == 'ghcr.io/twotwo-me/hammer:dev-sandbox'))"
      message: "Hammer Jobs must use an approved image profile"
    - expression: "(object.metadata.labels['dokkaebi.io/route-profile'] == 'hammer-no-k8s' && object.spec.template.spec.serviceAccountName == 'hammer-no-k8s' && has(object.spec.template.spec.automountServiceAccountToken) && object.spec.template.spec.automountServiceAccountToken == false) || (object.metadata.labels['dokkaebi.io/route-profile'] == 'hammer-k8s-readonly' && object.spec.template.spec.serviceAccountName == 'hammer-k8s-readonly') || (object.metadata.labels['dokkaebi.io/route-profile'] == 'hammer-k8s-app-deployer' && object.spec.template.spec.serviceAccountName == 'hammer-k8s-app-deployer') || (object.metadata.labels['dokkaebi.io/route-profile'] == 'hammer-k8s-job-runner' && object.spec.template.spec.serviceAccountName == 'hammer-k8s-job-runner')"
      message: "Hammer Job route profile must match its ServiceAccount and no-k8s token boundary"
    - expression: "!has(object.spec.template.metadata.labels) || !('dokkaebi.io/k8s-api-access' in object.spec.template.metadata.labels) || (object.metadata.labels['dokkaebi.io/route-profile'] in ['hammer-k8s-readonly', 'hammer-k8s-app-deployer', 'hammer-k8s-job-runner'] && object.spec.template.metadata.labels['dokkaebi.io/k8s-api-access'] == 'approved')"
      message: "Hammer Kubernetes API egress selector label is reserved for approved K8S route profiles"
    - expression: "!has(object.spec.template.spec.imagePullSecrets) || object.spec.template.spec.imagePullSecrets.size() == 0"
      message: "Hammer Jobs must not use imagePullSecrets"
    - expression: "!has(object.spec.template.spec.hostNetwork) || object.spec.template.spec.hostNetwork == false"
      message: "Hammer Jobs must not use hostNetwork"
    - expression: "object.spec.template.spec.containers.all(c, !has(c.ports) || c.ports.all(p, !has(p.hostPort) || p.hostPort == 0)) && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, !has(c.ports) || c.ports.all(p, !has(p.hostPort) || p.hostPort == 0)))"
      message: "Hammer containers must not use hostPort"
    - expression: "!has(object.spec.template.spec.hostPID) || object.spec.template.spec.hostPID == false"
      message: "Hammer Jobs must not use hostPID"
    - expression: "!has(object.spec.template.spec.hostIPC) || object.spec.template.spec.hostIPC == false"
      message: "Hammer Jobs must not use hostIPC"
    - expression: "!has(object.spec.template.spec.shareProcessNamespace) || object.spec.template.spec.shareProcessNamespace == false"
      message: "Hammer Jobs must not share process namespaces"
    - expression: "has(object.spec.template.spec.securityContext) && object.spec.template.spec.securityContext.runAsNonRoot == true && object.spec.template.spec.securityContext.runAsUser > 0 && object.spec.template.spec.securityContext.seccompProfile.type == 'RuntimeDefault'"
      message: "Hammer Jobs must use a non-root pod security context with RuntimeDefault seccomp"
    - expression: "object.spec.template.spec.containers.all(c, has(c.securityContext) && (!has(c.securityContext.privileged) || c.securityContext.privileged == false) && c.securityContext.allowPrivilegeEscalation == false && c.securityContext.readOnlyRootFilesystem == true && c.securityContext.runAsNonRoot == true && c.securityContext.runAsUser > 0 && c.securityContext.seccompProfile.type == 'RuntimeDefault' && 'ALL' in c.securityContext.capabilities.drop && (!has(c.securityContext.capabilities.add) || c.securityContext.capabilities.add.size() == 0))"
      message: "Hammer containers must use the approved non-root security context"
    - expression: "(!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, has(c.securityContext) && (!has(c.securityContext.privileged) || c.securityContext.privileged == false) && c.securityContext.allowPrivilegeEscalation == false && c.securityContext.readOnlyRootFilesystem == true && c.securityContext.runAsNonRoot == true && c.securityContext.runAsUser > 0 && c.securityContext.seccompProfile.type == 'RuntimeDefault' && 'ALL' in c.securityContext.capabilities.drop && (!has(c.securityContext.capabilities.add) || c.securityContext.capabilities.add.size() == 0))) && (!has(object.spec.template.spec.ephemeralContainers) || object.spec.template.spec.ephemeralContainers.all(c, has(c.securityContext) && (!has(c.securityContext.privileged) || c.securityContext.privileged == false) && c.securityContext.allowPrivilegeEscalation == false && c.securityContext.readOnlyRootFilesystem == true && c.securityContext.runAsNonRoot == true && c.securityContext.runAsUser > 0 && c.securityContext.seccompProfile.type == 'RuntimeDefault' && 'ALL' in c.securityContext.capabilities.drop && (!has(c.securityContext.capabilities.add) || c.securityContext.capabilities.add.size() == 0)))"
      message: "Hammer init and ephemeral containers must use the approved non-root security context"
    - expression: "object.spec.template.spec.containers.all(c, has(c.resources) && has(c.resources.requests) && c.resources.requests.size() > 0 && has(c.resources.limits) && c.resources.limits.size() > 0) && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, has(c.resources) && has(c.resources.requests) && c.resources.requests.size() > 0 && has(c.resources.limits) && c.resources.limits.size() > 0))"
      message: "Hammer containers must declare resource requests and limits"
    - expression: "!has(object.spec.template.spec.volumes) || object.spec.template.spec.volumes.all(v, !has(v.hostPath) && !has(v.secret) && (!has(v.projected) || v.projected.sources.all(s, !has(s.secret) && !has(s.serviceAccountToken))) && (!has(v.csi) || v.csi.driver != 'secrets-store.csi.k8s.io'))"
      message: "Hammer Jobs must not mount hostPath, Secret, projected token, projected Secret, or CSI secret-store volumes"
    - expression: "object.spec.template.spec.containers.all(c, !has(c.volumeMounts) || c.volumeMounts.all(m, m.mountPath != '/')) && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, !has(c.volumeMounts) || c.volumeMounts.all(m, m.mountPath != '/'))) && (!has(object.spec.template.spec.ephemeralContainers) || object.spec.template.spec.ephemeralContainers.all(c, !has(c.volumeMounts) || c.volumeMounts.all(m, m.mountPath != '/')))"
      message: "Hammer containers must not mount broad filesystem roots"
    - expression: "object.spec.template.spec.containers.all(c, (!has(c.envFrom) || c.envFrom.all(e, !has(e.secretRef))) && (!has(c.env) || c.env.all(e, !has(e.valueFrom) || !has(e.valueFrom.secretKeyRef) || (request.userInfo.username == 'system:serviceaccount:dokkaebi-system:dokkaebi-fire' && e.name == 'DOKKAEBI_LITELLM_VIRTUAL_KEY' && has(e.valueFrom.secretKeyRef.name) && e.valueFrom.secretKeyRef.name == 'dokkaebi-litellm-virtual-key-' + object.metadata.labels['dokkaebi.io/credential-grant-id'] && has(e.valueFrom.secretKeyRef.key) && e.valueFrom.secretKeyRef.key == 'api-key' && 'dokkaebi.io/litellm-key-scope' in object.metadata.labels && object.metadata.labels['dokkaebi.io/litellm-key-scope'] == 'run-scoped' && 'dokkaebi.io/litellm-key-ttl' in object.metadata.labels && object.metadata.labels['dokkaebi.io/litellm-key-ttl'] != '' && 'dokkaebi.io/litellm-key-owner' in object.metadata.labels && object.metadata.labels['dokkaebi.io/litellm-key-owner'] == 'fire-credential-broker' && 'dokkaebi.io/run-id' in object.metadata.labels && object.metadata.labels['dokkaebi.io/run-id'] != '')))) && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, (!has(c.envFrom) || c.envFrom.all(e, !has(e.secretRef))) && (!has(c.env) || c.env.all(e, !has(e.valueFrom) || !has(e.valueFrom.secretKeyRef))))) && (!has(object.spec.template.spec.ephemeralContainers) || object.spec.template.spec.ephemeralContainers.all(c, (!has(c.envFrom) || c.envFrom.all(e, !has(e.secretRef))) && (!has(c.env) || c.env.all(e, !has(e.valueFrom) || !has(e.valueFrom.secretKeyRef)))))"
      message: "Hammer containers may reference only broker-issued LiteLLM virtual-key Secrets through env"
    - expression: "object.spec.template.spec.containers.all(c, !has(c.env) || c.env.all(e, e.name != 'DOKKAEBI_RESULT_PACKET_SINK' || e.value == 'github-workpad://Project_Dokkaebi_K8S/issues/' + object.metadata.labels['dokkaebi.io/ticket-id'])) && (!has(object.spec.template.spec.initContainers) || object.spec.template.spec.initContainers.all(c, !has(c.env) || c.env.all(e, e.name != 'DOKKAEBI_RESULT_PACKET_SINK' || e.value == 'github-workpad://Project_Dokkaebi_K8S/issues/' + object.metadata.labels['dokkaebi.io/ticket-id']))) && (!has(object.spec.template.spec.ephemeralContainers) || object.spec.template.spec.ephemeralContainers.all(c, !has(c.env) || c.env.all(e, e.name != 'DOKKAEBI_RESULT_PACKET_SINK' || e.value == 'github-workpad://Project_Dokkaebi_K8S/issues/' + object.metadata.labels['dokkaebi.io/ticket-id']))) && object.spec.template.spec.containers.exists(c, has(c.env) && c.env.exists(e, e.name == 'DOKKAEBI_RESULT_PACKET_SINK' && e.value == 'github-workpad://Project_Dokkaebi_K8S/issues/' + object.metadata.labels['dokkaebi.io/ticket-id']))"
      message: "Hammer Jobs must declare an approved durable result packet sink matching the ticket id"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: dokkaebi-hammer-job-policy-binding
  labels:
    app.kubernetes.io/part-of: dokkaebi
spec:
  policyName: dokkaebi-hammer-job-policy
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: dokkaebi-workers
