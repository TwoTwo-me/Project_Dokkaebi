name: Dokkaebi governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  contract-docs:
    name: contract-docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Validate Carbon component library visual regression
        run: bash scripts/validate-carbon-component-library-visual-regression.sh

      - name: Validate Dokkaebi contract docs
        run: bash scripts/validate-contract-docs.sh

      - name: Validate Dokkaebi plugin package
        run: bash scripts/validate-dokkaebi-plugin.sh

      - name: Validate enterprise readiness criteria
        run: bash scripts/validate-readiness-criteria.sh

      - name: Validate enterprise scorecard loop
        run: bash scripts/validate-enterprise-scorecard.sh

      - name: Validate K8S platformization loop
        run: bash scripts/validate-k8s-platformization.sh

      - name: Validate all repository governance gates
        run: bash scripts/validate-all.sh

  git-governance:
    name: git-governance
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: false

      - name: Validate Git governance
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: bash scripts/validate-git-governance.sh
